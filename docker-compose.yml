version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: localloop_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: localloop
    ports:
      - "5432:5432"
    volumes:
      - localloop_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d localloop"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../localloop-backend
      dockerfile: Dockerfile
    container_name: localloop_backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgrespassword@postgres:5432/localloop?sslmode=disable
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  localloop_pgdata:
    driver: local
